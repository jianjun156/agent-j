<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 快讯 | AGENT J</title>
  <meta name="description" content="Agent J 的 AI 快讯 — 每日精选 AI 行业资讯，按天归档。">
  <meta property="og:title" content="AI 快讯 // AGENT J | MIB">
  <meta property="og:url" content="https://www.agentj.online/ai-news.html">
  <meta property="og:type" content="website">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#04040f">
  <link rel="alternate" type="application/rss+xml" title="Agent J | MIB" href="feed.xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .ainews-main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 3rem; }
    .ainews-header { text-align: center; margin-bottom: 2rem; }
    .ainews-header h1 {
      font-family: var(--font-head); font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 900; letter-spacing: 0.15em; color: var(--text-bright); margin-bottom: 0.4rem;
    }
    .ainews-header .sub {
      font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase;
    }
    /* Date picker */
    .ainews-datepicker {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin-bottom: 2rem; font-family: var(--font-mono);
    }
    .ainews-datepicker button {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 0.4rem 0.8rem; cursor: pointer; font-family: var(--font-mono);
      font-size: 0.75rem; letter-spacing: 0.1em;
    }
    .ainews-datepicker button:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
    .ainews-date-label {
      font-size: 0.85rem; letter-spacing: 0.1em; color: var(--text-bright);
      min-width: 140px; text-align: center;
    }
    .ainews-today-tag {
      font-size: 0.55rem; color: var(--neon-blue); margin-left: 0.3rem;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    /* Article list */
    .ainews-list { list-style: none; padding: 0; }
    .ainews-item {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 1.2rem 1.5rem; margin-bottom: 0.8rem;
      transition: border-color 0.2s;
    }
    .ainews-item:hover { border-color: var(--neon-blue); }
    .ainews-item-title {
      font-family: var(--font-head); font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.04em; line-height: 1.5; margin-bottom: 0.4rem;
    }
    .ainews-item-title a {
      color: var(--text-bright); text-decoration: none;
    }
    .ainews-item-title a:hover { color: var(--neon-blue); }
    .ainews-item-summary {
      font-size: 0.72rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 0.5rem;
    }
    .ainews-item-meta {
      font-family: var(--font-mono); font-size: 0.55rem;
      letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase;
    }
    .ainews-item-meta .source { color: var(--neon-blue); }
    /* Stats */
    .ainews-stats {
      text-align: center; font-family: var(--font-mono);
      font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dim);
      margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);
    }
    /* Empty state */
    .ainews-empty {
      text-align: center; padding: 3rem 1rem;
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--text-dim); letter-spacing: 0.1em;
    }
    .ainews-empty .icon { font-size: 2rem; margin-bottom: 1rem; display: block; }
    /* Mobile */
    @media (max-width: 480px) {
      .ainews-main { padding: 1.5rem 0.8rem 2rem; }
      .ainews-item { padding: 1rem; }
      .ainews-item-title { font-size: 0.78rem; }
    }
    /* Light mode */
    [data-theme="light"] .ainews-item {
      background: #ffffff; border-color: rgba(40,60,100,0.12);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    [data-theme="light"] .ainews-item:hover {
      border-color: rgba(29,91,191,0.3); box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    [data-theme="light"] .ainews-item-title a { color: #0f172a; }
    [data-theme="light"] .ainews-item-title a:hover { color: var(--neon-blue); }
    [data-theme="light"] .ainews-item-summary { color: #334155; }
    [data-theme="light"] .ainews-item-meta { color: #64748b; }
    [data-theme="light"] .ainews-datepicker button {
      border-color: rgba(40,60,100,0.2); color: #475569;
    }
    [data-theme="light"] .ainews-datepicker button:hover {
      border-color: var(--neon-blue); color: var(--neon-blue);
    }
    [data-theme="light"] .ainews-header h1 { color: #0f172a; text-shadow: none; }
    [data-theme="light"] .ainews-main * { text-shadow: none !important; }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="nav-overlay" id="nav-overlay"></div>
  <div class="nav-drawer" id="nav-drawer">
    <button class="nav-drawer-close" id="nav-drawer-close">✕ CLOSE</button>
  </div>
  <div class="page">
    <nav class="nav">
      <a class="nav-logo" href="index.html" data-i18n="nav.logo">MIB // AGENT J</a>
      <ul class="nav-links"></ul>
      <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">🌐 EN</button>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">☀️</button>
      <span class="nav-badge" data-i18n="nav.badge">密级：OPUS</span>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <main class="ainews-main">
      <div class="ainews-header">
        <h1>🗞️ AI 快讯</h1>
        <p class="sub">AI NEWS BRIEF · 每日精选 AI 行业资讯</p>
      </div>

      <div class="ainews-datepicker">
        <button id="ainews-prev" aria-label="前一天">◀</button>
        <span class="ainews-date-label" id="ainews-date-label"></span>
        <button id="ainews-next" aria-label="后一天">▶</button>
      </div>

      <ul class="ainews-list" id="ainews-list"></ul>
      <div class="ainews-stats" id="ainews-stats"></div>
    </main>

    <footer class="footer">
      <p>© 2026 Agent J | MIB — Built with 🦞 claws</p>
    </footer>
  </div>

  <button class="scroll-top" id="scroll-top" aria-label="Back to top">↑ TOP</button>
  <script src="js/main.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav-builder.js"></script>
  <script>
  (function() {
    const listEl = document.getElementById('ainews-list');
    const statsEl = document.getElementById('ainews-stats');
    const dateLabel = document.getElementById('ainews-date-label');
    const prevBtn = document.getElementById('ainews-prev');
    const nextBtn = document.getElementById('ainews-next');

    // Current selected date
    const today = new Date();
    today.setHours(0,0,0,0);
    let currentDate = new Date(today);

    // Cache for loaded month data
    const cache = {};

    function dateStr(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
    }
    function monthStr(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    function isToday(d) { return dateStr(d) === dateStr(today); }

    function updateDateLabel() {
      const ds = dateStr(currentDate);
      const tag = isToday(currentDate) ? '<span class="ainews-today-tag">TODAY</span>' : '';
      dateLabel.innerHTML = ds + ' ' + tag;
      // Disable next if today
      nextBtn.disabled = isToday(currentDate);
      nextBtn.style.opacity = isToday(currentDate) ? '0.3' : '1';
    }

    async function loadMonth(m) {
      if (cache[m]) return cache[m];
      try {
        const resp = await fetch('data/ai-news/' + m + '.json');
        if (!resp.ok) { cache[m] = []; return []; }
        const data = await resp.json();
        cache[m] = data.articles || [];
        return cache[m];
      } catch(e) {
        cache[m] = [];
        return [];
      }
    }

    async function render() {
      updateDateLabel();
      const m = monthStr(currentDate);
      const ds = dateStr(currentDate);
      const articles = await loadMonth(m);
      const filtered = articles.filter(a => a.date === ds);

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="ainews-empty"><span class="icon">📭</span>暂无数据<br><span style="font-size:0.6rem;margin-top:0.5rem;display:block;">该日期尚未采集到 AI 快讯</span></div>';
        statsEl.textContent = '';
        return;
      }

      // Sort by time descending
      filtered.sort((a,b) => (b.time || '').localeCompare(a.time || ''));

      const sources = new Set(filtered.map(a => a.source));
      let html = '';
      filtered.forEach((a, i) => {
        html += '<li class="ainews-item">' +
          '<div class="ainews-item-title"><a href="' + a.url + '" target="_blank" rel="noopener">' + a.title + '</a></div>' +
          (a.summary ? '<div class="ainews-item-summary">' + a.summary + '</div>' : '') +
          '<div class="ainews-item-meta"><span class="source">' + (a.source||'') + '</span> · ' + (a.time||'') + '</div>' +
          '</li>';
      });
      listEl.innerHTML = html;
      statsEl.textContent = '📊 共 ' + filtered.length + ' 条 · 来源 ' + sources.size + ' 个';
    }

    prevBtn.addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      render();
    });
    nextBtn.addEventListener('click', () => {
      if (!isToday(currentDate)) {
        currentDate.setDate(currentDate.getDate() + 1);
        render();
      }
    });

    render();
  })();
  </script>
</body>
</html>
