    /* ═══════════════════════════════════════════════
       BLOG — local styles
    ═══════════════════════════════════════════════ */
    .blog-header {
      text-align: center;
      padding: 3rem 2rem 1.5rem;
    }
    .blog-stamp {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      color: var(--neon-blue);
      opacity: 0.5;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    .blog-title {
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.15em;
      color: var(--text-bright);
      margin-bottom: 0.8rem;
    }
    .blog-meta-row {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .blog-meta-item {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
    }
    .blog-meta-val {
      font-family: var(--font-head);
      font-size: 1.3rem;
      display: block;
      margin-bottom: 0.1rem;
      color: var(--neon-blue);
    }

    /* ── Article List ── */
    .blog-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 2rem 3rem;
    }

    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 2rem;
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .article-card:hover {
      border-color: var(--border-glow);
      box-shadow: 0 0 20px rgba(68, 170, 255, 0.1);
    }

    .article-cover {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      filter: brightness(0.85) saturate(0.9);
      transition: filter 0.3s ease;
    }
    .article-card:hover .article-cover {
      filter: brightness(1) saturate(1);
    }

    .article-body {
      padding: 1.5rem 2rem;
    }

    .article-classification {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.15rem 0.6rem;
      border: 1px solid;
      display: inline-block;
      margin-bottom: 0.8rem;
    }
    .cls-classified {
      color: #f44;
      border-color: rgba(255, 68, 68, 0.3);
      background: rgba(255, 68, 68, 0.05);
    }
    .cls-declassified {
      color: #0f0;
      border-color: rgba(0, 255, 0, 0.3);
      background: rgba(0, 255, 0, 0.05);
    }
    .cls-secret {
      color: #ff0;
      border-color: rgba(255, 255, 0, 0.3);
      background: rgba(255, 255, 0, 0.05);
    }

    .article-title {
      font-family: var(--font-head);
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      letter-spacing: 0.08em;
      color: var(--text-bright);
      margin-bottom: 0.6rem;
      line-height: 1.5;
    }

    .article-date {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-bottom: 0.8rem;
    }

    .article-summary {
      font-size: 0.78rem;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .article-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .article-tag {
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      padding: 0.15rem 0.5rem;
      border: 1px solid rgba(100, 160, 255, 0.2);
      color: var(--text-dim);
      text-transform: lowercase;
    }

    /* ── Article Detail View ── */
    .article-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 2rem 3rem;
      display: none;
    }
    .article-detail.active {
      display: block;
    }

    .detail-back {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--neon-blue);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0.5rem 0;
      margin-bottom: 1.5rem;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .detail-back:hover {
      opacity: 0.7;
    }

    .detail-cover {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .detail-title {
      font-family: var(--font-head);
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      letter-spacing: 0.1em;
      color: var(--text-bright);
      margin-bottom: 0.6rem;
      line-height: 1.5;
    }

    .detail-meta {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(100, 160, 255, 0.1);
    }

    .detail-content {
      font-size: 0.85rem;
      line-height: 2;
      color: var(--text);
      white-space: pre-line;
    }

    .detail-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(100, 160, 255, 0.1);
    }

    /* ── Loading ── */
    .blog-loading {
      text-align: center;
      padding: 3rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Empty state ── */
    .blog-empty {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }
  </style>
</head>

  <script>
    /* ═══════════════════════════════════════════════
       BLOG — Dynamic article loading
    ═══════════════════════════════════════════════ */
    (function() {
      const lang = () => document.documentElement.lang || 'zh';
      const listEl = document.getElementById('blog-list');
      const detailEl = document.getElementById('article-detail');
      const loadingEl = document.getElementById('blog-loading');
      let articles = [];

      async function loadArticles() {
        try {
          const res = await fetch('data/articles.json?_=' + Date.now());
          articles = await res.json();
          renderList();
        } catch (e) {
          loadingEl.textContent = 'ERROR: FAILED TO DECRYPT ARCHIVES';
          console.error('Failed to load articles:', e);
        }
      }

      function renderList() {
        loadingEl.style.display = 'none';
        detailEl.classList.remove('active');
        listEl.style.display = 'block';

        // Update stats
        document.getElementById('article-count').textContent = articles.length;
        if (articles.length > 0) {
          document.getElementById('article-latest').textContent = articles[0].date;
        }

        // Clear existing cards (but keep loading el)
        const existingCards = listEl.querySelectorAll('.article-card');
        existingCards.forEach(c => c.remove());

        const emptyEl = listEl.querySelector('.blog-empty');
        if (emptyEl) emptyEl.remove();

        if (articles.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'blog-empty';
          empty.textContent = lang() === 'en' ? 'No articles yet. Stay tuned, Agent.' : '暂无文章。敬请期待，特工。';
          listEl.appendChild(empty);
          return;
        }

        articles.forEach((art, idx) => {
          const card = document.createElement('div');
          card.className = 'article-card';
          card.onclick = () => showDetail(idx);

          const l = lang();
          const title = l === 'en' ? art.title_en : art.title_zh;
          const summary = l === 'en' ? art.summary_en : art.summary_zh;
          const clsClass = art.classification === 'CLASSIFIED' ? 'cls-classified'
            : art.classification === 'DECLASSIFIED' ? 'cls-declassified' : 'cls-secret';

          card.innerHTML = `
            ${art.cover ? `<img class="article-cover" src="${art.cover}" alt="${title}" loading="lazy">` : ''}
            <div class="article-body">
              <span class="article-classification ${clsClass}">${art.classification}</span>
              ${art.content_type === 'html' ? '<span class="article-classification" style="color:var(--neon-blue);border-color:rgba(68,170,255,0.3);background:rgba(68,170,255,0.05);margin-left:0.5rem;">FULL ARTICLE ↗</span>' : ''}
              <h2 class="article-title">${title}</h2>
              <div class="article-date">${art.date} // ${art.id}</div>
              <p class="article-summary">${summary}</p>
              <div class="article-tags">
                ${art.tags.map(t => `<span class="article-tag">#${t}</span>`).join('')}
              </div>
            </div>
          `;
          listEl.appendChild(card);
        });
      }

      function showDetail(idx) {
        const art = articles[idx];
        if (!art) return;

        // If article has a full HTML page, open it directly
        if (art.content_type === 'html' && art.content_url) {
          window.open(art.content_url, '_blank');
          return;
        }

        const l = lang();
        const title = l === 'en' ? art.title_en : art.title_zh;
        const content = l === 'en' ? art.content_en : art.content_zh;
        const clsClass = art.classification === 'CLASSIFIED' ? 'cls-classified'
          : art.classification === 'DECLASSIFIED' ? 'cls-declassified' : 'cls-secret';

        detailEl.innerHTML = `
          <button class="detail-back" onclick="window.blogBack()">◂ ${l === 'en' ? 'BACK TO LIST' : '返回列表'}</button>
          ${art.cover ? `<img class="detail-cover" src="${art.cover}" alt="${title}">` : ''}
          <span class="article-classification ${clsClass}">${art.classification}</span>
          <h1 class="detail-title">${title}</h1>
          <div class="detail-meta">${art.date} // ${art.id} // AGENT J</div>
          <div class="detail-content">${content}</div>
          <div class="detail-tags">
            ${art.tags.map(t => `<span class="article-tag">#${t}</span>`).join('')}
          </div>
        `;

        listEl.style.display = 'none';
        detailEl.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        window.location.hash = art.id;
      }

      window.blogBack = function() {
        window.location.hash = '';
        detailEl.classList.remove('active');
        listEl.style.display = 'block';
        renderList();
      };

      // Handle hash routing
      function checkHash() {
        const hash = window.location.hash.replace('#', '');
        if (hash && articles.length > 0) {
          const idx = articles.findIndex(a => a.id === hash);
          if (idx >= 0) {
            showDetail(idx);
            return;
          }
        }
      }

      // Re-render on language change
      const origToggle = window.toggleLang;
      window.toggleLang = function() {
        if (origToggle) origToggle();
        setTimeout(() => {
          if (detailEl.classList.contains('active')) {
            const hash = window.location.hash.replace('#', '');
            const idx = articles.findIndex(a => a.id === hash);
            if (idx >= 0) showDetail(idx);
          } else {
            renderList();
          }
        }, 50);
      };

      window.addEventListener('hashchange', checkHash);

      loadArticles().then(() => checkHash());
    })();
  </script>
